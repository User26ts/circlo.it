
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Circlo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    color: #111;
  }

  header {
    background: #0b1f3a;
    color: white;
    padding: 25px;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 30px;
  }

  header p {
    margin: 5px 0 0;
    color: #cfe3ff;
    font-size: 13px;
  }

  .container {
    max-width: 900px;
    margin: 50px auto;
    text-align: center;
    padding: 20px;
  }

  .card {
    background: white;
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  }

  .btn {
    padding: 12px 18px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .primary {
    background: #1d4ed8;
    color: white;
  }

  .secondary {
    background: white;
    border: 1px solid #1d4ed8;
    color: #1d4ed8;
  }

  .small-links {
    margin-top: 15px;
    font-size: 12px;
    color: #666;
  }

  .small-links a {
    margin: 0 10px;
    color: #555;
    text-decoration: none;
  }

  .small-links a:hover {
    text-decoration: underline;
  }

</style>
</head>

<body>

<header>
  <h1>Circlo</h1>
  <p>Connessioni basate su interessi condivisi</p>
</header>

<div class="container">

  <div class="card">

    <h2>Benvenuto su Circlo</h2>
    <p>
      Uno spazio per incontrare persone compatibili nella tua area universitaria e sociale.
    </p>

    <button class="btn primary">Accedi</button>
    <button class="btn secondary">Registrati (18+)</button>

    <div class="small-links">
      <a href="#">Progetto Circlo</a>
      <a href="mailto:info@circlo.it">Contatti</a>
    </div>

  </div>

</div>

</body>
</html>
